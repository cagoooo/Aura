name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'functions/**'
      - 'docs/**'
      - '*.md'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /Aura
          NEXT_PUBLIC_API_BASE: https://asia-east1-aura-2sg5o.cloudfunctions.net
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          # Cache-bust og:image so FB/LINE re-crawl on each deploy
          NEXT_PUBLIC_BUILD_ID: ${{ github.sha }}
        run: npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
