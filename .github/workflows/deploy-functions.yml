name: Deploy Cloud Functions

# Manual-only by default. Once FIREBASE_SERVICE_ACCOUNT_AURA secret is set,
# you can change `on:` to also include `push: paths: ['functions/**']` for
# auto-deploy on backend changes.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build

      - uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --project aura-2sg5o
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AURA }}
